<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <title>Nulliøn</title>

  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#9b84ff"/>
      <stop offset="100%" stop-color="#5b3fd4"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="500" height="500" fill="#0d0d14"/>

  <!-- Purple disc -->
  <circle cx="250" cy="250" r="190" fill="url(#g)"/>

  <!-- White Ø: ring + slash, same stroke weight -->
  <circle cx="250" cy="250" r="100" fill="none" stroke="#fff" stroke-width="22"/>
  <line   x1="178" y1="328" x2="322" y2="172" stroke="#fff" stroke-width="22" stroke-linecap="round"/>

</svg>
