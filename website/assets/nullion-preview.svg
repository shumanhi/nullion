<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-label="Nulliøn.ai app screenshot preview">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151621"/>
      <stop offset="1" stop-color="#07080c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1d28"/>
      <stop offset="1" stop-color="#12131b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8e78ff"/>
      <stop offset="1" stop-color="#6d55ee"/>
    </linearGradient>
    <linearGradient id="approval" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#242431"/>
      <stop offset="1" stop-color="#171720"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity=".48"/>
    </filter>
    <filter id="cardShadow" x="-14%" y="-20%" width="128%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity=".38"/>
