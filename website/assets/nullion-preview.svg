    <text x="146" y="719" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="750" fill="#f5f4fb">https://news.example.com</text>
    <rect x="616" y="696" width="112" height="34" rx="8" fill="#282457" stroke="#6958e7"/>
    <text x="672" y="719" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850" fill="#b8a9ff">Allow once</text>
