name: PR Suite

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_ref:
        description: "nullion-test branch, tag, or SHA"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: pr-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NULLION_TEST_REPOSITORY: shumanhi/nullion-test

jobs:
  private-test-shards:
    name: Private tests shard ${{ matrix.shard }}/${{ matrix.total-shards }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
        total-shards: [8]
    steps:
      - name: Checkout Nullion app
        uses: actions/checkout@v4
        with:
          path: nullion

      - name: Require private test suite key
        shell: bash
        env:
          NULLION_TEST_REPO_SSH_KEY: ${{ secrets.NULLION_TEST_REPO_SSH_KEY }}
        run: |
          if [[ -z "${NULLION_TEST_REPO_SSH_KEY}" ]]; then
            echo "::error title=Missing NULLION_TEST_REPO_SSH_KEY::Add a repository secret named NULLION_TEST_REPO_SSH_KEY using the read-only deploy key for shumanhi/nullion-test."
            exit 1
          fi

      - name: Resolve private test suite checkout
        id: test-checkout
        shell: bash
        env:
          INPUT_TEST_REF: ${{ github.event.inputs.test_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          NULLION_TEST_REPO_SSH_KEY: ${{ secrets.NULLION_TEST_REPO_SSH_KEY }}
        run: |
          test_ref="${INPUT_TEST_REF}"

          if [[ -z "${test_ref}" && "${{ github.event_name }}" == "pull_request" ]]; then
            test_ref="$(printf '%s\n' "${PR_BODY}" | sed -n 's/^Nullion-Test-Ref:[[:space:]]*//p' | head -n 1)"
          fi

          if [[ -z "${test_ref}" && "${{ github.event_name }}" == "pull_request" && "${HEAD_REF}" == nullion/* ]]; then
            test_ref="nullion-test/${HEAD_REF#nullion/}"
          fi

          if [[ -z "${test_ref}" ]]; then
            test_ref="main"
          fi

          if [[ "${test_ref}" != "main" ]]; then
            key_file="$(mktemp)"
            chmod 600 "${key_file}"
            printf '%s\n' "${NULLION_TEST_REPO_SSH_KEY}" > "${key_file}"
            repo_ssh="git@github.com:${NULLION_TEST_REPOSITORY}.git"
            ssh_cmd="ssh -i ${key_file} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

            if ! GIT_SSH_COMMAND="${ssh_cmd}" git ls-remote --exit-code "${repo_ssh}" "refs/heads/${test_ref}" >/dev/null 2>&1 \
              && ! GIT_SSH_COMMAND="${ssh_cmd}" git ls-remote --exit-code "${repo_ssh}" "refs/tags/${test_ref}" >/dev/null 2>&1; then
              echo "Requested nullion-test ref '${test_ref}' not found; falling back to main."
              test_ref="main"
            fi

            rm -f "${key_file}"
          fi

          echo "ref=${test_ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout private test suite
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NULLION_TEST_REPOSITORY }}
          ssh-key: ${{ secrets.NULLION_TEST_REPO_SSH_KEY }}
          ref: ${{ steps.test-checkout.outputs.ref }}
          path: nullion-test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: nullion/pyproject.toml

      - name: Install app and test runner
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./nullion coverage pytest pytest-asyncio

      - name: Select private test shard
        shell: bash
        env:
          NULLION_TEST_SHARD: ${{ matrix.shard }}
          NULLION_TEST_TOTAL_SHARDS: ${{ matrix.total-shards }}
        run: |
          python - <<'PY' > /tmp/nullion-private-test-files.txt
          import os
          from pathlib import Path

          shard = int(os.environ["NULLION_TEST_SHARD"])
          total = int(os.environ["NULLION_TEST_TOTAL_SHARDS"])
          tests_root = Path("nullion-test/tests")
          files = sorted(
              {
                  path
                  for pattern in ("test_*.py", "*_test.py")
                  for path in tests_root.rglob(pattern)
              }
          )
          selected = [path for index, path in enumerate(files) if index % total == shard - 1]
          if not selected:
              raise SystemExit(f"no tests selected for shard {shard}/{total}")
          print("\n".join(str(path) for path in selected))
          PY
          echo "Selected $(wc -l < /tmp/nullion-private-test-files.txt) test files for shard ${NULLION_TEST_SHARD}/${NULLION_TEST_TOTAL_SHARDS}."

      - name: Run private suite shard with coverage
        shell: bash
        env:
          NULLION_APP_REPO: ${{ github.workspace }}/nullion
        run: |
          python -m coverage erase
          python -m coverage run --parallel-mode --source=nullion/src/nullion -m pytest -q $(cat /tmp/nullion-private-test-files.txt)

      - name: Upload private coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: private-coverage-${{ matrix.shard }}
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  private-tests:
    name: Private tests and coverage
    runs-on: ubuntu-latest
    needs: private-test-shards
    if: always()
    timeout-minutes: 30
    steps:
      - name: Checkout Nullion app
        uses: actions/checkout@v4
        with:
          path: nullion

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: nullion/pyproject.toml

      - name: Install coverage
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage

      - name: Fail if any private test shard failed
        shell: bash
        run: |
          if [[ "${{ needs.private-test-shards.result }}" != "success" ]]; then
            echo "Private test shard result: ${{ needs.private-test-shards.result }}"
            exit 1
          fi

      - name: Download private coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: private-coverage-*
          path: coverage-data
          merge-multiple: true

      - name: Combine private coverage
        shell: bash
        run: |
          python -m coverage combine coverage-data
          python -m coverage report --fail-under=70

